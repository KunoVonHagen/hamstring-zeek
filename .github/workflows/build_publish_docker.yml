name: Docker Build and Publish CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    env:
      OS: "ubuntu-latest"
      LIBRDKAFKA_VERSION: "1.4.4"
      ZEEK_KAFKA_VERSION: "1.2.0"

    name: Docker Zeek on ${{ env.OS }}, librdkafka ${{ env.LIBRDKAFKA_VERSION }}, zeek-kafka ${{ env.ZEEK_KAFKA_VERSION }}
    runs-on: ${{ env.OS }}
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: versioning
        run: |
          set -e

          # Initialize VERSION if it doesn't exist
          if [ ! -f VERSION ]; then
            echo "0.1.0" > VERSION
          fi

          CURRENT_VERSION=$(cat VERSION)
          IFS='.' read -r -a PARTS <<< "$CURRENT_VERSION"
          MAJOR="${PARTS[0]}"
          MINOR="${PARTS[1]}"
          PATCH="${PARTS[2]}"

          BUMP="patch"
          COMMIT_MSG=$(git log -1 --pretty=%B)

          # Stop if already bumped in this run (prevents loops if [skip ci] fails)
          if [[ "$COMMIT_MSG" == *"chore: bump version to"* ]]; then
            echo "Version already bumped in this commit. Skipping."
            echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Attempt to grab branch name from a merge commit "Merge pull request #1 from org/feature/xyz"
          BRANCH=""
          if echo "$COMMIT_MSG" | grep -q "Merge pull request"; then
             BRANCH=$(echo "$COMMIT_MSG" | grep -o "from [^ ]*" | cut -d' ' -f2 | cut -d'/' -f2-)
          fi

          # Determine bump level
          if [[ "$BRANCH" == *"feature/"* || "$BRANCH" == *"feat/"* || "$COMMIT_MSG" == *"feat:"* || "$COMMIT_MSG" == *"feature:"* ]]; then
            BUMP="minor"
          elif [[ "$BRANCH" == *"release/"* || "$COMMIT_MSG" == *"release:"* || "$COMMIT_MSG" == *"major:"* ]]; then
            BUMP="major"
          elif [[ "$BRANCH" == *"bugfix/"* || "$BRANCH" == *"hotfix/"* || "$BRANCH" == *"fix/"* || "$BRANCH" == *"docs/"* || "$COMMIT_MSG" == *"fix:"* ]]; then
            BUMP="patch"
          fi

          # Apply bump
          if [[ "$BUMP" == "major" ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ "$BUMP" == "minor" ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $BUMP: $CURRENT_VERSION -> $NEW_VERSION"
          echo "$NEW_VERSION" > VERSION

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push VERSION
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add VERSION
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to ${{ steps.versioning.outputs.version }} [skip ci]"
            git push
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: ghcr.io/hamstring-ndr/hamstring-zeek
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.versioning.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: ./src/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            LIBRDKAFKA_VERSION=${{ env.LIBRDKAFKA_VERSION }}
            ZEEK_KAFKA_VERSION=${{ env.ZEEK_KAFKA_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
